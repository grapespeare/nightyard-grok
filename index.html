<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NIGHTYARD • Living Ecosystem</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { margin:0; overflow:hidden; background:#0a0720; font-family: system-ui, -apple-system, sans-serif; }
  canvas { display:block; width:100vw; height:100vh; image-rendering: crisp-edges; }
  .header { position:fixed; top:0; left:0; right:0; z-index:50; background:rgba(0,0,0,0.75); backdrop-filter:blur(8px); }
  .debug { position:fixed; bottom:0; left:0; right:0; z-index:50; background:rgba(0,0,0,0.85); color:#4ade80; font-family:ui-monospace,monospace; font-size:10px; max-height:35vh; overflow-y:auto; padding:6px 10px; }
  .toast { position:fixed; bottom:70px; left:50%; transform:translateX(-50%); z-index:60; background:#facc15; color:#000; padding:4px 14px; border-radius:9999px; font-size:13px; font-weight:600; box-shadow:0 10px 15px -3px rgb(0 0 0 / 0.3); }
  .house { transition: filter 0.2s; }
</style>
</head>
<body>
<canvas id="canvas"></canvas>

<!-- Header -->
<div class="header px-3 py-2 flex items-center justify-between text-yellow-300">
  <div class="flex items-center gap-x-2">
    <div class="text-2xl font-bold tracking-tighter">NIGHTYARD</div>
    <div class="text-[10px] opacity-60 pt-1">LIVING GARAGE SALE ECOSYSTEM</div>
  </div>
  <div class="flex items-center gap-x-1.5">
    <button onclick="simulateSale()" class="px-3 py-1 text-xs bg-yellow-400 hover:bg-yellow-300 active:bg-yellow-500 text-black font-semibold rounded transition-colors">SIMULATE SALE</button>
    <button onclick="toggleDebug()" class="px-2.5 py-1 text-xs bg-white/10 hover:bg-white/20 active:bg-white/30 rounded transition-colors">DEBUG</button>
  </div>
</div>

<!-- Debug Panel -->
<div id="debug-panel" class="debug hidden">
  <div class="flex justify-between items-center mb-1 text-yellow-300">
    <div class="font-bold">DEBUG CONSOLE</div>
    <button onclick="clearDebug()" class="text-[9px] px-1.5 py-0.5 bg-white/10 rounded">CLEAR</button>
  </div>
  <div id="debug-log" class="whitespace-pre-wrap leading-tight"></div>
</div>

<!-- Toast -->
<div id="toast" class="toast hidden"></div>

<script>
// === CONFIG ===
const SUPABASE_URL = 'https://pznhqablycnhyepwymks.supabase.co/rest/v1';
const ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB6bmhxYWJseWNuaHllcHd5bWtzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwNjE4ODUsImV4cCI6MjA5NDYzNzg4NX0.C4s0xJiJfGLn-pz2ltgyrwNohUwq85-Jd-6vitsVDFo';

// === STATE ===
let homes = [];
let particles = [];
let reactions = new Map();
let buyer = { x: 40, y: 0, active: false, targetX: 200, targetHomeId: null };
let lastPoll = Date.now() - 120000;
let debugVisible = false;
let W = 0, H = 0;
let ctx, canvas;

// === UTILS ===
function logDebug(msg) {
  const el = document.getElementById('debug-log');
  if (!el) return;
  const time = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'});
  el.textContent = `[${time}] ${msg}\n` + el.textContent;
  if (el.textContent.length > 800) el.textContent = el.textContent.slice(0, 800);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.remove('hidden');
  setTimeout(() => t.classList.add('hidden'), 2200);
}

function toggleDebug() {
  debugVisible = !debugVisible;
  const p = document.getElementById('debug-panel');
  p.classList.toggle('hidden', !debugVisible);
  if (debugVisible) logDebug('Debug panel opened');
}

function clearDebug() {
  document.getElementById('debug-log').textContent = '';
}

function getColor(field, fallback) {
  if (!field) return fallback;
  const f = String(field).toLowerCase().trim();
  if (f.includes('light') || f.includes('peach') || f.includes('fair')) return '#f8d5b8';
  if (f.includes('medium') || f.includes('tan') || f.includes('olive')) return '#d4a574';
  if (f.includes('dark') || f.includes('brown') || f.includes('deep')) return '#8d5524';
  if (f.includes('blue')) return '#3b82f6';
  if (f.includes('red') || f.includes('rose')) return '#ef4444';
  if (f.includes('green')) return '#22c55e';
  if (f.includes('yellow') || f.includes('gold')) return '#eab308';
  // hash for unknown
  let h = 0;
  for (let i = 0; i < f.length; i++) h = f.charCodeAt(i) + ((h << 5) - h);
  return `hsl(${Math.abs(h) % 360}, 65%, 58%)`;
}

// === SUPABASE REST ===
async function api(path, opts = {}) {
  const url = SUPABASE_URL + path;
  const res = await fetch(url, {
    headers: {
      'apikey': ANON_KEY,
      'Authorization': `Bearer ${ANON_KEY}`,
      'Content-Type': 'application/json',
      ...opts.headers
    },
    ...opts
  });
  if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
  return res.json();
}

async function loadHomes() {
  try {
    const data = await api('/nightyard_homes?select=*&order=plot_position.asc');
    homes = Array.isArray(data) ? data : [];
    logDebug(`Loaded ${homes.length} homes from DB`);
    return homes;
  } catch (e) {
    logDebug('ERROR loading homes: ' + e.message);
    homes = [{family_id:'demo1', display_name:'vineyardkyle', plot_position:1, character_skin:'light', character_shirt:'blue', character_hair:'brown', user_id:'demo'}];
    return homes;
  }
}

async function pollSales() {
  try {
    const since = new Date(lastPoll - 30000).toISOString();
    const events = await api(`/sale_events?select=*&created_at=gte.${since}&order=created_at.desc&limit=8`);
    if (!events || !events.length) return;
    for (const ev of events) {
      if (ev.event_type === 'item_sold' && ev.item_id) {
        await handleSoldEvent(ev);
      }
    }
    lastPoll = Date.now();
  } catch (e) {
    // silent in production, visible in debug
    if (debugVisible) logDebug('poll error: ' + e.message);
  }
}

async function handleSoldEvent(ev) {
  try {
    const items = await api(`/nightyard_items?id=eq.${ev.item_id}&select=created_by,title,price_cents`);
    const item = items && items[0];
    if (!item) return;
    const sellerHome = homes.find(h => h.user_id === item.created_by || h.family_id === ev.family_id);
    if (!sellerHome) {
      logDebug('No matching home for seller ' + item.created_by);
      return;
    }
    showToast(`SOLD: ${item.title || 'Item'} — ${sellerHome.display_name}`);
    // Buyer walk animation
    buyer.x = 25;
    buyer.y = H * 0.68;
    buyer.targetX = 55 + (homes.indexOf(sellerHome) * (W / Math.max(5, homes.length)));
    buyer.targetHomeId = sellerHome.family_id;
    buyer.active = true;
    logDebug(`Sale handled for ${sellerHome.display_name}`);
  } catch (e) {
    logDebug('handleSold error: ' + e.message);
  }
}

// === DRAWING ===
function drawHouse(ctx, x, y, home, isReacting) {
  const skin = getColor(home.character_skin, '#c48a5e');
  const shirt = getColor(home.character_shirt, '#3b82f6');
  const roof = '#3f2a1f';

  // shadow
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.fillRect(x+4, y+58, 62, 8);

  // body
  ctx.fillStyle = skin;
  ctx.fillRect(x, y, 70, 55);

  // roof
  ctx.fillStyle = roof;
  ctx.beginPath();
  ctx.moveTo(x - 4, y + 1);
  ctx.lineTo(x + 35, y - 28);
  ctx.lineTo(x + 74, y + 1);
  ctx.fill();

  // door
  ctx.fillStyle = shirt;
  ctx.fillRect(x + 26, y + 28, 18, 27);

  // windows
  ctx.fillStyle = isReacting ? '#fef08c' : '#fefce8';
  ctx.fillRect(x + 7, y + 10, 13, 12);
  ctx.fillRect(x + 50, y + 10, 13, 12);
  if (isReacting) {
    ctx.fillStyle = '#f59e0b';
    ctx.fillRect(x + 7, y + 10, 13, 12);
    ctx.fillRect(x + 50, y + 10, 13, 12);
  }

  // label
  ctx.fillStyle = '#e2e8f0';
  ctx.font = '700 9px system-ui';
  const label = (home.display_name || 'Home').slice(0, 14);
  ctx.fillText(label, x + 4, y + 72);
}

function drawCharacter(ctx, x, y, home, t) {
  const skin = getColor(home.character_skin, '#c48a5e');
  const shirt = getColor(home.character_shirt, '#3b82f6');
  const sway = Math.sin(t) * 1.2;

  // legs
  ctx.strokeStyle = '#1f2937';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(x + 8, y + 22);
  ctx.lineTo(x + 8 + sway * 0.3, y + 38);
  ctx.moveTo(x + 18, y + 22);
  ctx.lineTo(x + 18 - sway * 0.3, y + 38);
  ctx.stroke();

  // body
  ctx.fillStyle = shirt;
  ctx.fillRect(x + 3, y + 8, 20, 18);

  // head
  ctx.fillStyle = skin;
  ctx.beginPath();
  ctx.arc(x + 13, y + 3, 9, 0, Math.PI * 2);
  ctx.fill();

  // hair
  ctx.fillStyle = getColor(home.character_hair, '#4b2e0f');
  ctx.fillRect(x + 5, y - 4, 16, 7);

  // eyes (cute big eyes like reference)
  ctx.fillStyle = '#111827';
  ctx.beginPath();
  ctx.arc(x + 9, y + 3, 2.8, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(x + 17, y + 3, 2.8, 0, Math.PI * 2);
  ctx.fill();

  // eye shine
  ctx.fillStyle = '#fff';
  ctx.fillRect(x + 10, y + 1.5, 1.2, 1.2);
  ctx.fillRect(x + 18, y + 1.5, 1.2, 1.2);
}

function drawBuyer(ctx, x, y) {
  ctx.fillStyle = '#334155';
  ctx.fillRect(x, y, 18, 22);
  ctx.fillStyle = '#64748b';
  ctx.beginPath();
  ctx.arc(x + 9, y - 6, 7, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#1e2937';
  ctx.fillRect(x + 3, y + 4, 12, 3);
}

function drawParticles(ctx) {
  for (const p of particles) {
    ctx.globalAlpha = Math.max(0.2, p.life / 45);
    ctx.fillStyle = p.color || '#fef08c';
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size || 2.2, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// === MAIN LOOP ===
function update() {
  // buyer walk
  if (buyer.active) {
    const dx = buyer.targetX - buyer.x;
    buyer.x += dx * 0.08;
    buyer.y = H * 0.68 + Math.sin(Date.now()/180) * 3;
    if (Math.abs(dx) < 6 && buyer.targetHomeId) {
      triggerCelebration(buyer.targetHomeId);
      buyer.active = false;
    }
  }

  // particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx || 0;
    p.y += p.vy || 0.15;
    p.life -= 1;
    if (p.vy) p.vy += 0.03;
    if (p.life <= 0) particles.splice(i, 1);
  }

  // clear old reactions
  const now = Date.now();
  for (const [id, end] of reactions) {
    if (now > end) reactions.delete(id);
  }
}

function draw() {
  ctx.fillStyle = '#0a0720';
  ctx.fillRect(0, 0, W, H);

  // sky gradient
  const sky = ctx.createLinearGradient(0, 0, 0, H * 0.62);
  sky.addColorStop(0, '#0a0720');
  sky.addColorStop(0.4, '#120d2e');
  sky.addColorStop(1, '#1a1535');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, H * 0.62);

  // stars
  ctx.fillStyle = '#e0e7ff';
  for (let i = 0; i < 90; i++) {
    const sx = ((i * 41) % W) + Math.sin(Date.now()/900 + i) * 0.3;
    const sy = ((i * 17) % (H * 0.48)) + 8;
    ctx.fillRect(sx, sy, 1.4, 1.4);
  }

  // ground
  ctx.fillStyle = '#13240f';
  ctx.fillRect(0, H * 0.62, W, H * 0.38);

  // path
  ctx.fillStyle = '#2c2118';
  ctx.fillRect(0, H * 0.69, W, 52);

  // houses + characters
  if (homes.length === 0) {
    ctx.fillStyle = '#64748b';
    ctx.font = '14px system-ui';
    ctx.fillText('No homes loaded — check Supabase or simulate sale', 40, H * 0.5);
  }

  const sorted = [...homes].sort((a,b) => (a.plot_position || 99) - (b.plot_position || 99));
  const gap = Math.max(82, Math.floor(W / Math.max(4, sorted.length + 1)));

  sorted.forEach((home, idx) => {
    const hx = 28 + idx * gap;
    const hy = H * 0.52 + (idx % 2 === 0 ? 0 : 14);
    const reacting = reactions.has(home.family_id);
    drawHouse(ctx, hx, hy, home, reacting);
    drawCharacter(ctx, hx + 22, hy + 48, home, Date.now() / 280 + idx);
  });

  // buyer
  if (buyer.active) drawBuyer(ctx, buyer.x, buyer.y);

  // particles
  drawParticles(ctx);

  // subtle vignette
  const vig = ctx.createRadialGradient(W/2, H/2, Math.min(W,H)*0.3, W/2, H/2, Math.max(W,H)*0.8);
  vig.addColorStop(0, 'transparent');
  vig.addColorStop(1, 'rgba(0,0,0,0.35)');
  ctx.fillStyle = vig;
  ctx.fillRect(0, 0, W, H);
}

let raf;
function loop() {
  update();
  draw();
  raf = requestAnimationFrame(loop);
}

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  buyer.y = H * 0.68;
}

// === INTERACTION ===
function simulateSale() {
  if (homes.length === 0) {
    homes = [{family_id: 'demo-' + Date.now(), display_name: 'TestHome', plot_position: 1, character_skin: 'light', character_shirt: 'blue', character_hair: 'brown', user_id: 'demo'}];
  }
  const randomHome = homes[Math.floor(Math.random() * homes.length)];
  buyer.x = 25;
  buyer.y = H * 0.68;
  buyer.targetX = 55 + (homes.indexOf(randomHome) * (W / Math.max(5, homes.length)));
  buyer.targetHomeId = randomHome.family_id;
  buyer.active = true;
  showToast('Test sale triggered — watch the buyer walk!');
  logDebug('Simulated sale for ' + randomHome.display_name);
}

// === INIT ===
async function init() {
  canvas = document.getElementById('canvas');
  ctx = canvas.getContext('2d', { alpha: true });

  resize();
  window.addEventListener('resize', resize);

  // initial fireflies
  for (let i = 0; i < 22; i++) {
    particles.push({
      x: Math.random() * W,
      y: Math.random() * H * 0.55,
      vx: (Math.random() - 0.5) * 0.6,
      vy: (Math.random() - 0.5) * 0.4,
      life: 120 + Math.random() * 80,
      color: '#fef08c',
      size: 1.8
    });
  }

  await loadHomes();

  // start polling
  setInterval(pollSales, 4200);

  // first draw
  draw();

  // main loop
  loop();

  // keyboard
  document.addEventListener('keydown', (e) => {
    if (e.key.toLowerCase() === 'd') toggleDebug();
    if (e.key.toLowerCase() === 's') simulateSale();
  });

  // tap canvas to simulate
  canvas.addEventListener('click', (e) => {
    const rect = canvas.getBoundingClientRect();
    const clickX = e.clientX - rect.left;
    // find closest house
    let closest = null;
    let minDist = 9999;
    const sorted = [...homes].sort((a,b) => (a.plot_position||99)-(b.plot_position||99));
    sorted.forEach((h, i) => {
      const hx = 28 + i * Math.max(82, Math.floor(W / Math.max(4, sorted.length + 1)));
      const d = Math.abs(hx - clickX);
      if (d < minDist) { minDist = d; closest = h; }
    });
    if (closest) {
      buyer.x = 25;
      buyer.y = H * 0.68;
      buyer.targetX = 55 + (sorted.indexOf(closest) * (W / Math.max(5, sorted.length)));
      buyer.targetHomeId = closest.family_id;
      buyer.active = true;
      showToast('Sale triggered on ' + closest.display_name);
    } else {
      simulateSale();
    }
  });

  logDebug('NIGHTYARD v0.5 initialized — canvas ready, polling active');
  if (homes.length === 0) logDebug('WARNING: No homes from DB — using demo mode');
}

// boot
init();
</script>
</body>
</html>
