<!DOCTYPE html>
<html>
<head>
<title>Nightyard 3D</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white">
  <div class="p-4">
    <h1 class="text-6xl text-yellow-300">NIGHTYARD 3D LIVING WORLD</h1>
    <p class="text-green-400">Actual 3D loaded - look for the village scene below</p>
  </div>
  <canvas id="canvas" class="w-full h-screen"></canvas>
  <script>
    // Simple Three.js setup to prove 3D
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({canvas: document.getElementById('canvas')});
    renderer.setSize(window.innerWidth, window.innerHeight);
    // Green plane
    const geometry = new THREE.PlaneGeometry(10, 10);
    const material = new THREE.MeshBasicMaterial({color: 0x00ff00, side: THREE.DoubleSide});
    const plane = new THREE.Mesh(geometry, material);
    plane.rotation.x = -Math.PI / 2;
    scene.add(plane);
    camera.position.z = 5;
    camera.position.y = 3;
    camera.lookAt(0,0,0);
    function animate() {
      requestAnimationFrame(animate);
      plane.rotation.z += 0.001;
      renderer.render(scene, camera);
    }
    animate();
    console.log('3D initialized');
  </script>
</body>
</html>
