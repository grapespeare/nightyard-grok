<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NIGHTYARD • Living World</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body{margin:0;overflow:hidden;background:#0a0720;font-family:system-ui,-apple-system,sans-serif}
  canvas{display:block;width:100vw;height:100vh;image-rendering:crisp-edges}
  .header{position:fixed;top:0;left:0;right:0;z-index:50;background:rgba(10,7,32,0.85);backdrop-filter:blur(12px);border-bottom:1px solid rgba(234,179,8,0.2)}
  .debug{position:fixed;bottom:0;left:0;right:0;z-index:50;background:rgba(0,0,0,0.92);color:#4ade80;font-family:ui-monospace,monospace;font-size:9.5px;max-height:38vh;overflow-y:auto;padding:8px 12px;border-top:1px solid #334155}
  .toast{position:fixed;bottom:78px;left:50%;transform:translateX(-50%);z-index:60;background:#facc15;color:#111827;padding:6px 18px;border-radius:9999px;font-size:13px;font-weight:700;box-shadow:0 20px 25px -5px rgb(0 0 0 / 0.3),0 8px 10px -6px rgb(0 0 0 / 0.3);white-space:nowrap}
  .mini-btn{padding:4px 10px;font-size:10px;border-radius:6px;transition:all .1s ease}
</style>
</head>
<body>
<canvas id="canvas"></canvas>

<div class="header px-4 py-2.5 flex items-center justify-between text-yellow-300">
  <div class="flex items-center gap-x-3">
    <div>
      <div class="text-3xl font-bold tracking-[-1.5px] leading-none">NIGHTYARD</div>
      <div class="text-[9px] text-yellow-400/70 -mt-0.5 tracking-[1.5px]">LIVING GARAGE SALE WORLD</div>
    </div>
  </div>
  <div class="flex items-center gap-x-1.5">
    <button onclick="simulateSale()" class="mini-btn bg-yellow-400 hover:bg-yellow-300 active:bg-yellow-500 text-black font-semibold">SIMULATE SALE</button>
    <button onclick="toggleDebug()" class="mini-btn bg-white/10 hover:bg-white/20 text-white/90">DEBUG</button>
    <button onclick="addWeather()" class="mini-btn bg-white/10 hover:bg-white/20 text-white/90">WEATHER</button>
  </div>
</div>

<div id="debug-panel" class="debug hidden">
  <div class="flex items-center justify-between mb-1">
    <div class="text-yellow-300 font-bold text-xs tracking-widest">DEBUG • LIVE LOGS</div>
    <button onclick="clearDebug()" class="text-[9px] px-2 py-0.5 bg-white/10 rounded">CLEAR</button>
  </div>
  <div id="debug-log" class="whitespace-pre-wrap leading-[1.05] text-[9.5px]"></div>
</div>

<div id="toast" class="toast hidden"></div>

<script>
// CONFIG
const SUPABASE_URL = 'https://pznhqablycnhyepwymks.supabase.co/rest/v1';
const ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB6bmhxYWJseWNuaHllcHd5bWtzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwNjE4ODUsImV4cCI6MjA5NDYzNzg4NX0.C4s0xJiJfGLn-pz2ltgyrwNohUwq85-Jd-6vitsVDFo';

// STATE
let homes = [];
let particles = [];
let reactions = new Map();
let buyer = {x:30, y:0, active:false, targetX:180, targetHomeId:null, holdingItem:false};
let lastPoll = Date.now() - 90000;
let debugVisible = false;
let W = 0, H = 0, time = 0;
let ctx, canvas;
let weatherMode = 'fireflies'; // fireflies | leaves | mist
let cameraOffset = 0;

// UTILS
function log(msg) {
  const el = document.getElementById('debug-log');
  if (!el) return;
  const t = new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit',second:'2-digit'});
  el.textContent = `[${t}] ${msg}\n` + el.textContent;
  if (el.textContent.length > 1200) el.textContent = el.textContent.slice(0,1200);
}
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.remove('hidden');
  setTimeout(() => t.classList.add('hidden'), 2100);
}
function toggleDebug() {
  debugVisible = !debugVisible;
  document.getElementById('debug-panel').classList.toggle('hidden', !debugVisible);
}
function clearDebug() { document.getElementById('debug-log').textContent = ''; }

function getColor(field, fb) {
  if (!field) return fb;
  const f = String(field).toLowerCase();
  if (f.includes('light')||f.includes('peach')) return '#f8d5b8';
  if (f.includes('medium')||f.includes('tan')) return '#d4a574';
  if (f.includes('dark')||f.includes('brown')) return '#8d5524';
  if (f.includes('blue')) return '#3b82f6';
  if (f.includes('red')) return '#ef4444';
  if (f.includes('green')) return '#22c55e';
  let h=0; for(let i=0;i<f.length;i++) h = f.charCodeAt(i)+((h<<5)-h);
  return `hsl(${Math.abs(h)%360},68%,58%)`;
}

// SUPABASE REST
async function api(p, o={}) {
  const r = await fetch(SUPABASE_URL+p, {headers:{'apikey':ANON_KEY,'Authorization':`Bearer ${ANON_KEY}`,'Content-Type':'application/json'},...o});
  if(!r.ok) throw new Error(r.status+' '+r.statusText);
  return r.json();
}
async function loadHomes() {
  try {
    const d = await api('/nightyard_homes?select=*&order=plot_position.asc');
    homes = Array.isArray(d)?d:[];
    log(`Loaded ${homes.length} homes`);
  } catch(e){ log('Homes error: '+e.message); homes=[{family_id:'d1',display_name:'Kyle',plot_position:1,character_skin:'light',character_shirt:'blue',character_hair:'brown',user_id:'d'}]; }
}
async function poll() {
  try {
    const since = new Date(lastPoll-45000).toISOString();
    const evs = await api(`/sale_events?select=*&created_at=gte.${since}&order=created_at.desc&limit=6`);
    if(evs?.length) for(const ev of evs) if(ev.event_type==='item_sold'&&ev.item_id) await handleSale(ev);
    lastPoll = Date.now();
  } catch(e){ if(debugVisible) log('poll: '+e.message); }
}
async function handleSale(ev) {
  try {
    const it = await api(`/nightyard_items?id=eq.${ev.item_id}&select=created_by,title`);
    const item = it?.[0]; if(!item) return;
    const home = homes.find(h => h.user_id===item.created_by || h.family_id===ev.family_id);
    if(!home) return;
    toast(`SOLD • ${item.title||'Item'} → ${home.display_name}`);
    buyer.x = 22; buyer.y = H*0.67; buyer.targetX = 48 + homes.indexOf(home)*(W/Math.max(5,homes.length)); buyer.targetHomeId=home.family_id; buyer.active=true; buyer.holdingItem=false;
    log(`Sale → ${home.display_name}`);
  } catch(e){ log('sale err: '+e.message); }
}

// DRAWING — RICH LAYERED WORLD
function draw() {
  ctx.save();
  // SKY + ATMOSPHERE
  const sky = ctx.createLinearGradient(0,0,0,H*0.58);
  sky.addColorStop(0,'#0a0720'); sky.addColorStop(0.35,'#120d2e'); sky.addColorStop(1,'#1a1535');
  ctx.fillStyle=sky; ctx.fillRect(0,0,W,H*0.58);

  // DISTANT HILLS (parallax layer 1)
  ctx.fillStyle='#16240f';
  ctx.beginPath(); ctx.moveTo(0,H*0.42);
  ctx.quadraticCurveTo(W*0.2,H*0.31,W*0.45,H*0.39);
  ctx.quadraticCurveTo(W*0.7,H*0.28,W,H*0.37);
  ctx.lineTo(W,H*0.58); ctx.lineTo(0,H*0.58); ctx.fill();

  // MID TREES / FOLIAGE (parallax layer 2)
  ctx.fillStyle='#1f2e12';
  for(let i=0;i<7;i++){
    const bx = ((i*73 + cameraOffset*0.3)%(W+120))-40;
    ctx.beginPath(); ctx.ellipse(bx, H*0.47 + (i%2)*8, 38, 22, 0, 0, Math.PI*2); ctx.fill();
  }

  // STARS + MOON
  ctx.fillStyle='#e0e7ff';
  for(let i=0;i<75;i++){
    const x=((i*47)%W) + Math.sin(time/900+i)*0.4;
    const y=((i*19)%(H*0.42))+6;
    ctx.fillRect(x,y,1.3,1.3);
  }
  // moon
  ctx.fillStyle='#e2e8f0';
  ctx.beginPath(); ctx.arc(W*0.78, H*0.18, 18, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle='#1a1535'; ctx.beginPath(); ctx.arc(W*0.81, H*0.16, 15, 0, Math.PI*2); ctx.fill();

  // GROUND
  ctx.fillStyle='#13240f'; ctx.fillRect(0,H*0.58,W,H*0.42);

  // PATH + DIRT (layered for depth)
  ctx.fillStyle='#2c2118'; ctx.fillRect(0,H*0.66,W,58);
  ctx.fillStyle='#3a2a20'; ctx.fillRect(0,H*0.67,W,8);

  // GRASS DETAIL (foreground parallax)
  ctx.strokeStyle='#1f3a12'; ctx.lineWidth=1.5;
  for(let i=0;i<38;i++){
    const gx = (i*31 + cameraOffset*0.6)%W;
    const gy = H*0.71 + Math.sin(i)*3;
    ctx.beginPath(); ctx.moveTo(gx,gy); ctx.lineTo(gx+Math.sin(time/200+i)*4, gy-11-Math.random()*3); ctx.stroke();
  }

  // HOUSES + CHARACTERS
  const sorted = [...homes].sort((a,b)=>(a.plot_position||99)-(b.plot_position||99));
  const gap = Math.max(78, W/Math.max(5,sorted.length+1));
  sorted.forEach((home,idx)=>{
    const hx = 26 + idx*gap + Math.sin(time/600+idx)*1.5;
    const hy = H*0.49 + (idx%2)*11;
    const reacting = reactions.has(home.family_id);
    drawHouse(ctx, hx, hy, home, reacting);
    drawCharacter(ctx, hx+24, hy+52, home, time/260 + idx*0.7);
  });

  // BUYER + ITEM
  if(buyer.active){
    drawBuyer(ctx, buyer.x, buyer.y, buyer.holdingItem);
  }

  // PARTICLES (fireflies / leaves / mist)
  drawParticles(ctx);

  // VIGNETTE + ATMOSPHERE
  const vig = ctx.createRadialGradient(W/2,H/2,Math.min(W,H)*0.35, W/2,H/2, Math.max(W,H)*0.85);
  vig.addColorStop(0,'transparent'); vig.addColorStop(1,'rgba(0,0,0,0.45)');
  ctx.fillStyle=vig; ctx.fillRect(0,0,W,H);

  // subtle light rays from moon
  ctx.strokeStyle='rgba(226,232,240,0.06)'; ctx.lineWidth=28;
  ctx.beginPath(); ctx.moveTo(W*0.78,H*0.18); ctx.lineTo(W*0.3,H*0.82); ctx.stroke();

  ctx.restore();
}

function drawHouse(ctx,x,y,home,reacting){
  const skin=getColor(home.character_skin,'#c48a5e');
  const shirt=getColor(home.character_shirt,'#3b82f6');
  // shadow
  ctx.fillStyle='rgba(0,0,0,0.3)'; ctx.fillRect(x+5,y+62,64,7);
  // body + trim
  ctx.fillStyle=skin; ctx.fillRect(x,y+2,68,56);
  ctx.fillStyle='#2f2118'; ctx.fillRect(x,y+2,68,4);
  // roof (layered for depth)
  ctx.fillStyle='#3f2a1f'; ctx.beginPath(); ctx.moveTo(x-3,y+3); ctx.lineTo(x+34,y-26); ctx.lineTo(x+71,y+3); ctx.fill();
  ctx.fillStyle='#2a1f15'; ctx.beginPath(); ctx.moveTo(x+8,y+3); ctx.lineTo(x+34,y-18); ctx.lineTo(x+60,y+3); ctx.fill();
  // door
  ctx.fillStyle=shirt; ctx.fillRect(x+25,y+30,18,28);
  ctx.fillStyle='#1f2937'; ctx.fillRect(x+30,y+38,8,8);
  // windows with glow
  const win = reacting ? '#fef08c' : '#fefce8';
  ctx.fillStyle=win; ctx.fillRect(x+6,y+12,12,11); ctx.fillRect(x+50,y+12,12,11);
  if(reacting){ ctx.fillStyle='#f59e0b'; ctx.fillRect(x+6,y+12,12,11); ctx.fillRect(x+50,y+12,12,11); }
  // chimney smoke
  if(reacting || Math.sin(time/300+home.plot_position)>0.6){
    ctx.fillStyle='rgba(120,120,130,0.5)';
    for(let s=0;s<3;s++){
      const sy = y-8 - s*7 + Math.sin(time/180+s)*2;
      ctx.fillRect(x+55+s*2, sy, 5-s, 4);
    }
  }
  // label
  ctx.fillStyle='#e2e8f0'; ctx.font='700 8.5px system-ui'; ctx.fillText((home.display_name||'Home').slice(0,13),x+3,y+76);
}

function drawCharacter(ctx,x,y,home,t){
  const skin=getColor(home.character_skin,'#c48a5e');
  const shirt=getColor(home.character_shirt,'#3b82f6');
  const sway=Math.sin(t)*1.8;
  // legs
  ctx.strokeStyle='#1f2937'; ctx.lineWidth=2.8;
  ctx.beginPath(); ctx.moveTo(x+7,y+20); ctx.lineTo(x+7+sway*0.4,y+36); ctx.moveTo(x+17,y+20); ctx.lineTo(x+17-sway*0.4,y+36); ctx.stroke();
  // body
  ctx.fillStyle=shirt; ctx.fillRect(x+2,y+7,20,17);
  // arms (gentle idle)
  ctx.strokeStyle=skin; ctx.lineWidth=2.2;
  ctx.beginPath(); ctx.moveTo(x+4,y+11); ctx.lineTo(x+2+sway*0.6,y+22); ctx.moveTo(x+20,y+11); ctx.lineTo(x+22-sway*0.6,y+22); ctx.stroke();
  // head
  ctx.fillStyle=skin; ctx.beginPath(); ctx.arc(x+12,y+2,8.5,0,Math.PI*2); ctx.fill();
  // hair (varied styles)
  ctx.fillStyle=getColor(home.character_hair,'#4b2e0f');
  ctx.fillRect(x+4,y-5,16,6);
  if(home.character_hair && home.character_hair.toLowerCase().includes('long')){
    ctx.fillRect(x+3,y+1,4,9); ctx.fillRect(x+19,y+1,4,9);
  }
  // big cute eyes
  ctx.fillStyle='#111827'; ctx.beginPath(); ctx.arc(x+8,y+2,2.6,0,Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(x+16,y+2,2.6,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#fff'; ctx.fillRect(x+9,y+0.5,1.1,1.1); ctx.fillRect(x+17,y+0.5,1.1,1.1);
  // smile or expression on reaction
  if(reactions.has(home.family_id)){ ctx.strokeStyle='#111827'; ctx.lineWidth=1.2; ctx.beginPath(); ctx.arc(x+12,y+6,2.2,0.2,Math.PI-0.2); ctx.stroke(); }
}

function drawBuyer(ctx,x,y,holding){
  ctx.fillStyle='#334155'; ctx.fillRect(x,y,17,20);
  ctx.fillStyle='#64748b'; ctx.beginPath(); ctx.arc(x+8.5,y-5,6.5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#1e2937'; ctx.fillRect(x+2,y+4,13,3);
  if(holding){ ctx.fillStyle='#f59e0b'; ctx.fillRect(x+18,y+2,7,7); }
}

function drawParticles(ctx){
  ctx.globalAlpha=1;
  for(const p of particles){
    ctx.globalAlpha = Math.max(0.15, p.life/55);
    ctx.fillStyle = p.color || '#fef08c';
    ctx.beginPath();
    if(p.type==='leaf'){
      ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.life/8); ctx.fillRect(-3,-1.5,6,3); ctx.restore();
    } else {
      ctx.arc(p.x,p.y, p.size||2.1, 0, Math.PI*2); ctx.fill();
    }
  }
  ctx.globalAlpha=1;
}

// UPDATE
function update(){
  time += 1;
  cameraOffset = Math.sin(time/900)*6;

  // buyer walk + hold item
  if(buyer.active){
    const dx = buyer.targetX - buyer.x;
    buyer.x += dx*0.085;
    buyer.y = H*0.67 + Math.sin(time/160)*2.5;
    if(Math.abs(dx)<5 && buyer.targetHomeId){
      triggerCelebration(buyer.targetHomeId);
      buyer.active=false; buyer.holdingItem=false;
    }
  }

  // particles physics
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x += p.vx||0; p.y += p.vy||0.12;
    p.life -= 1;
    if(p.vy) p.vy += (p.type==='leaf'?0.02:0.015);
    if(p.type==='firefly' && Math.random()<0.04){ p.vx = (Math.random()-0.5)*0.8; p.vy=(Math.random()-0.5)*0.6; }
    if(p.life<=0) particles.splice(i,1);
  }

  // clear finished reactions
  const now=Date.now();
  for(const [id,end] of reactions) if(now>end) reactions.delete(id);
}

function loop(){ update(); draw(); requestAnimationFrame(loop); }

function resize(){ W=canvas.width=window.innerWidth; H=canvas.height=window.innerHeight; buyer.y=H*0.67; }

// CELEBRATION + WORLD EVENT
function triggerCelebration(homeId){
  reactions.set(homeId, Date.now()+2800);
  const idx = homes.findIndex(h=>h.family_id===homeId);
  const hx = 26 + idx * (W/Math.max(5,homes.length+1));
  // multiple particle systems for "event close" feeling
  for(let i=0;i<32;i++){
    particles.push({x:hx+20+Math.random()*35, y:H*0.49+25, vx:(Math.random()-0.5)*3.2, vy:-1.8-Math.random()*1.6, life:38+Math.random()*22, color:['#fef08c','#f59e0b','#fff','#a5f3fc'][i%4], size:1.8+Math.random()*1.2});
  }
  // extra "happy" burst near character
  for(let i=0;i<14;i++){
    particles.push({x:hx+22+Math.random()*18, y:H*0.49+48, vx:(Math.random()-0.5)*2.5, vy:-2.2-Math.random()*1.4, life:26+Math.random()*14, color:'#fef08c', size:1.6});
  }
  log('Celebration triggered on home '+(idx+1));
}

function addWeather(){
  weatherMode = (weatherMode==='fireflies') ? 'leaves' : (weatherMode==='leaves' ? 'mist' : 'fireflies');
  log('Weather → '+weatherMode);
  if(weatherMode==='leaves'){
    for(let i=0;i<18;i++) particles.push({x:Math.random()*W, y:-10-Math.random()*H*0.3, vx:(Math.random()-0.5)*0.8, vy:0.6+Math.random()*0.4, life:160+Math.random()*60, color:'#4ade80', type:'leaf', size:3.5});
  }
  if(weatherMode==='mist'){
    for(let i=0;i<9;i++) particles.push({x:Math.random()*W, y:H*0.4+Math.random()*H*0.3, vx:0.1+Math.random()*0.3, vy:0.02, life:220+Math.random()*80, color:'rgba(200,210,220,0.35)', size:18+Math.random()*12});
  }
}

function simulateSale(){
  if(!homes.length) homes=[{family_id:'demo',display_name:'TestHome',plot_position:1,character_skin:'light',character_shirt:'blue',character_hair:'brown',user_id:'d'}];
  const h = homes[Math.floor(Math.random()*homes.length)];
  buyer.x=22; buyer.y=H*0.67; buyer.targetX=48 + homes.indexOf(h)*(W/Math.max(5,homes.length)); buyer.targetHomeId=h.family_id; buyer.active=true; buyer.holdingItem=false;
  toast('Test sale — buyer walking to '+h.display_name);
}

// INIT
async function init(){
  canvas=document.getElementById('canvas');
  ctx=canvas.getContext('2d',{alpha:true});
  resize(); window.addEventListener('resize',resize);

  // seed rich particles
  for(let i=0;i<26;i++) particles.push({x:Math.random()*W, y:Math.random()*H*0.5, vx:(Math.random()-0.5)*0.7, vy:(Math.random()-0.5)*0.5, life:90+Math.random()*70, color:'#fef08c', type:'firefly', size:1.9});

  await loadHomes();
  setInterval(poll, 4100);
  draw(); loop();

  // interactions
  canvas.addEventListener('click', e=>{
    const rect=canvas.getBoundingClientRect(); const cx=e.clientX-rect.left;
    let closest=null, minD=999;
    const sorted=[...homes].sort((a,b)=>(a.plot_position||99)-(b.plot_position||99));
    sorted.forEach((h,i)=>{ const hx=26+i*(W/Math.max(5,sorted.length+1)); const d=Math.abs(hx-cx); if(d<minD){minD=d; closest=h;} });
    if(closest){ buyer.x=22; buyer.y=H*0.67; buyer.targetX=48 + sorted.indexOf(closest)*(W/Math.max(5,sorted.length)); buyer.targetHomeId=closest.family_id; buyer.active=true; toast('Sale on '+closest.display_name); }
    else simulateSale();
  });
  document.addEventListener('keydown',e=>{ if(e.key.toLowerCase()==='d')toggleDebug(); if(e.key.toLowerCase()==='s')simulateSale(); if(e.key.toLowerCase()==='w')addWeather(); });

  log('NIGHTYARD v0.6 — rich layered world ready (Animal Crossing feel target)');
  if(!homes.length) log('No DB homes — demo mode active');
}
init();
</script>
</body>
</html>
